<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Text Format Converter</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; --line:#334155; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text);
           min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:1.5rem; }
    .card { background:var(--card); border-radius:16px; padding:2rem; width:100%; max-width:560px;
            box-shadow:0 10px 40px rgba(0,0,0,.4); }
    h1 { margin:0 0 .25rem; font-size:1.5rem; }
    p.sub { margin:0 0 1.25rem; color:var(--muted); font-size:.9rem; }
    label { display:block; font-size:.78rem; color:var(--muted); margin:.9rem 0 .3rem; text-transform:uppercase; letter-spacing:.05em; }
    input[type=file], input[type=url], select { width:100%; padding:.65rem; border-radius:8px; border:1px solid var(--line);
            background:#0f172a; color:var(--text); font-size:.92rem; }
    .row { display:flex; gap:1rem; }
    .row > div { flex:1; }
    button { width:100%; margin-top:1.25rem; padding:.8rem; border:none; border-radius:8px;
             background:var(--accent); color:#04222e; font-weight:600; font-size:1rem; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .tabs { display:flex; gap:.5rem; margin-bottom:1rem; }
    .tabs button { flex:1; margin:0; padding:.55rem; background:#0f172a; color:var(--muted); border:1px solid var(--line); font-weight:500; }
    .tabs button.active { background:var(--accent); color:#04222e; border-color:var(--accent); }
    .checks { display:flex; gap:1.25rem; margin-top:.9rem; flex-wrap:wrap; }
    .checks label { display:flex; align-items:center; gap:.4rem; margin:0; text-transform:none; letter-spacing:0; font-size:.85rem; color:var(--text); cursor:pointer; }
    .checks input { width:auto; }
    details { margin-top:1rem; border:1px solid var(--line); border-radius:8px; padding:.6rem .8rem; }
    summary { cursor:pointer; font-size:.85rem; color:var(--muted); }
    .msg { margin-top:1rem; padding:.75rem; border-radius:8px; font-size:.88rem; display:none; }
    .msg.error { background:#7f1d1d; color:#fecaca; display:block; }
    .msg.ok { background:#064e3b; color:#a7f3d0; display:block; }
    .hint { font-size:.74rem; color:var(--muted); margin-top:.35rem; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Text Format Converter</h1>
    <p class="sub">Chuyển đổi qua lại giữa nhiều định dạng tài liệu và dữ liệu.</p>

    <div class="tabs">
      <button type="button" id="tab-file" class="active">Từ file</button>
      <button type="button" id="tab-url">Từ URL</button>
    </div>

    <!-- FILE MODE -->
    <form id="form-file">
      <label for="file">Chọn file (có thể chọn nhiều)</label>
      <input type="file" id="file" name="file" multiple required>

      <div class="row">
        <div>
          <label for="source">Từ định dạng</label>
          <select id="source" name="source"></select>
        </div>
        <div>
          <label for="target">Sang định dạng</label>
          <select id="target" name="target"></select>
        </div>
      </div>

      <div class="checks">
        <label><input type="checkbox" id="merge"> Gộp nhiều file thành 1</label>
      </div>
    </form>

    <!-- URL MODE -->
    <form id="form-url" class="hidden">
      <label for="url">Dán link trang web</label>
      <input type="url" id="url" name="url" placeholder="https://example.com/article">
      <label for="target-url">Sang định dạng</label>
      <select id="target-url" name="target-url"></select>
      <p class="hint">Chỉ nhận URL http/https công khai. Kết quả là định dạng tài liệu (md, pdf, docx...).</p>
    </form>

    <!-- SHARED OPTIONS -->
    <details open>
      <summary>Tùy chọn</summary>
      <div class="row">
        <div>
          <label for="theme">Theme (HTML/PDF)</label>
          <select id="theme">
            <option value="default">Default</option>
            <option value="github">GitHub</option>
            <option value="dark">Dark</option>
            <option value="minimal">Minimal</option>
          </select>
        </div>
        <div>
          <label for="paper">Cỡ giấy (PDF)</label>
          <select id="paper">
            <option>A4</option><option>Letter</option><option>Legal</option>
            <option>A3</option><option>A5</option>
          </select>
        </div>
      </div>
      <div class="checks">
        <label><input type="checkbox" id="toc"> Thêm mục lục (Table of Contents)</label>
      </div>
    </details>

    <button type="button" id="btn">Chuyển đổi & Tải về</button>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const msg = $('msg'), btn = $('btn');
    let mode = 'file';

    function fill(sel, items, withAuto) {
      sel.innerHTML = '';
      if (withAuto) {
        const o = document.createElement('option');
        o.value = 'auto'; o.textContent = 'Tự động (theo đuôi file)';
        sel.appendChild(o);
      }
      let lastFamily = null, group = null;
      items.forEach(f => {
        if (f.family !== lastFamily) {
          group = document.createElement('optgroup');
          group.label = f.family === 'document' ? 'Tài liệu' : 'Dữ liệu';
          sel.appendChild(group); lastFamily = f.family;
        }
        const opt = document.createElement('option');
        opt.value = f.name; opt.textContent = `${f.label} (${f.extension})`;
        group.appendChild(opt);
      });
    }

    function show(text, kind) { msg.textContent = text; msg.className = 'msg ' + kind; }

    async function load() {
      const data = await (await fetch('/api/formats')).json();
      const fmts = data.formats;
      fill($('source'), fmts.filter(f => f.readable), true);
      fill($('target'), fmts.filter(f => f.writable), false);
      // URL target: only document formats make sense.
      fill($('target-url'), fmts.filter(f => f.writable && f.family === 'document'), false);
      if ($('target').options.length > 1) $('target').value = 'pdf';
      if ($('target-url').querySelector('option[value="pdf"]')) $('target-url').value = 'pdf';
    }

    function setMode(m) {
      mode = m;
      $('tab-file').classList.toggle('active', m === 'file');
      $('tab-url').classList.toggle('active', m === 'url');
      $('form-file').classList.toggle('hidden', m !== 'file');
      $('form-url').classList.toggle('hidden', m !== 'url');
    }
    $('tab-file').onclick = () => setMode('file');
    $('tab-url').onclick = () => setMode('url');

    function download(blob, dispo) {
      const match = (dispo || '').match(/filename="?([^"]+)"?/);
      const name = match ? match[1] : 'converted';
      const u = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = u; a.download = name; a.click();
      URL.revokeObjectURL(u);
      return name;
    }

    btn.onclick = async () => {
      msg.className = 'msg';
      const fd = new FormData();
      fd.append('theme', $('theme').value);
      fd.append('paper_size', $('paper').value);
      fd.append('toc', $('toc').checked);

      let endpoint;
      if (mode === 'file') {
        const files = $('file').files;
        if (!files.length) { show('Vui lòng chọn file.', 'error'); return; }
        for (const f of files) fd.append('files', f);
        fd.append('source', $('source').value);
        fd.append('target', $('target').value);
        fd.append('merge', $('merge').checked);
        endpoint = '/api/convert';
      } else {
        const url = $('url').value.trim();
        if (!url) { show('Vui lòng nhập URL.', 'error'); return; }
        fd.append('url', url);
        fd.append('target', $('target-url').value);
        endpoint = '/api/convert-url';
      }

      btn.disabled = true; btn.textContent = 'Đang xử lý...';
      try {
        const res = await fetch(endpoint, { method: 'POST', body: fd });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: 'Lỗi không xác định' }));
          show(err.detail || 'Chuyển đổi thất bại.', 'error'); return;
        }
        const name = download(await res.blob(), res.headers.get('Content-Disposition'));
        show('Đã chuyển đổi xong: ' + name, 'ok');
      } catch (err) {
        show('Lỗi kết nối: ' + err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Chuyển đổi & Tải về';
      }
    };

    load();
  </script>
</body>
</html>
