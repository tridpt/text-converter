# Render.com Blueprint. Push this repo and create a new Blueprint on Render,
# or connect the repo and Render will detect the Dockerfile.

services:
  - type: web
    name: text-converter
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: MAX_UPLOAD_MB
        value: "25"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: SANITIZE_HTML
        value: "1"
