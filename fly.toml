# Fly.io configuration. Adjust `app` to a unique name before first deploy
# (or let `fly launch` generate one).

app = "text-converter"
primary_region = "sin"  # Singapore; change to a region near you

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8000"
  MAX_UPLOAD_MB = "25"
  RATE_LIMIT_PER_MINUTE = "60"
  SANITIZE_HTML = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      method = "GET"
      path = "/health"
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
